<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Pwani Pure</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:black;
      color:white;
    }

    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px;
      border-bottom:1px solid gold;
    }
.nav-links{
  display:flex;
  gap:20px;
}

.nav-links a{
  color:white;
  text-decoration:none;
  transition:0.3s;
}

.nav-links a:hover{
  color:gold;
}
    .logo{
      color:gold;
      font-size:28px;
      font-weight:bold;
    }

    .hero{
      height:90vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
    }

    .hero h1{
      font-size:50px;
      color:gold;
      margin-bottom:20px;
    }

    .hero p{
      max-width:600px;
      line-height:1.8;
      margin-bottom:30px;
    }

    .btn{
      background:gold;
      color:black;
      padding:15px 35px;
      text-decoration:none;
      font-weight:bold;
      border-radius:40px;
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.05);
    }

  </style>
</head>

<body>

  <nav>

  <div class="logo">Pwani Pure</div>

  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">Skincare</a>
    <a href="#">Fashion</a>
    <a href="#">Contact</a>
  </div>

</nav>

  <section class="hero">
    <h1>Luxury Beauty & Fashion</h1>

    <p>
      Discover premium skincare and elegant fashion designed
      for confidence, beauty, and timeless luxury.
    </p>

    <a href="#" class="btn">Shop Now</a>
  </section>

</body>
</html>
